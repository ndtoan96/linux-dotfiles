[language-server.pyrefly]
command = "pyrefly"
args = ["lsp"]

[[language]]
name = "python"
language-servers = ["pyrefly"]

[[language]]
name = "javascript"
formatter = { command = "biome", args = [
  "format",
  "--stdin-file-path",
  "file.js"
] }

[[language]]
name = "typescript"
formatter = { command = "biome", args = [
  "format",
  "--stdin-file-path",
  "file.ts"
] }

[[language]]
name = "json"
formatter = { command = "biome", args = [
  "format",
  "--stdin-file-path",
  "file.json"
] }

[[language]]
name = "css"
formatter = { command = "biome", args = [
  "format",
  "--stdin-file-path",
  "file.css"
] }
